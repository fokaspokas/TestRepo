<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Калькулятор рабочего времени</title>
  <style>
    :root {
      --panel: #171a21;
      --panel-2: #1e232d;
      --text: #f3f5f7;
      --muted: #98a2b3;
      --muted-2: rgba(152, 162, 179, 0.52);
      --accent: #6ea8fe;
      --border: #2b3240;
      --success: #22c55e;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0f14;
    }

    body {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0c0f14 0%, #11151c 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    .card {
      background: rgba(23, 26, 33, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    h1 {
      font-size: 1.45rem;
      line-height: 1.15;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      color: #d7dce4;
      font-weight: 600;
    }

    .inputShell {
      position: relative;
    }

    .input {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      caret-color: var(--text);
      border-radius: 16px;
      padding: 14px 52px 14px 16px;
      font-size: 1.15rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      letter-spacing: 0.01em;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(110, 168, 254, 0.14);
    }

    .ghost {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.15rem;
      color: var(--muted-2);
      pointer-events: none;
      user-select: none;
      white-space: pre;
      letter-spacing: 0.01em;
    }

    .clearBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      color: rgba(243,245,247,0.82);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 2;
    }

    .clearBtn.visible { display: flex; }

    .row {
      display: grid;
      grid-template-columns: 56px 110px 56px;
      gap: 10px;
      align-items: center;
    }

    .btn {
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #1d2430 0%, #161c25 100%);
      color: var(--text);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .result {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: grid;
      gap: 12px;
    }

    .resultBox {
      background: linear-gradient(180deg, rgba(59,130,246,0.10), rgba(59,130,246,0.04));
      border: 1px solid rgba(110,168,254,.2);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .resultLabel {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .resultValue {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .error {
      min-height: 22px;
      color: #ff9090;
      font-size: 0.9rem;
      padding-left: 2px;
    }

    .liveInline {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted-2);
      pointer-events: none;
    }

    .liveDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(34,197,94,.7);
    }

    .rateWrap { position: relative; }

    .rateInput {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 32px 14px 16px;
      font-size: 1.15rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .rateInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(110, 168, 254, 0.14);
    }

    .currency {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .measure {
      position: absolute;
      visibility: hidden;
      white-space: pre;
      font-size: 1.15rem;
      letter-spacing: 0.01em;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    @media (min-width: 520px) {
      .grid.two { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Калькулятор рабочего времени</h1>
      <p class="sub">Введите начало и окончание работы в формате ЧЧ:ММ. Если время окончания пустое, будет использоваться текущее время и результат станет пересчитываться автоматически.</p>

      <div class="grid two">
        <div class="field">
          <label for="start">Время начала</label>
          <div class="inputShell">
            <input id="start" class="input" type="text" inputmode="numeric" autocomplete="off" enterkeyhint="next" aria-label="Время начала" maxlength="5" />
            <div id="startGhost" class="ghost" aria-hidden="true"></div>
            <button id="startClear" class="clearBtn" type="button" aria-label="Очистить время начала">×</button>
          </div>
        </div>

        <div class="field">
          <label for="end">Время окончания</label>
          <div class="inputShell">
            <input id="end" class="input" type="text" inputmode="numeric" autocomplete="off" enterkeyhint="done" aria-label="Время окончания" maxlength="5" />
            <div id="endGhost" class="ghost" aria-hidden="true"></div>
            <button id="endClear" class="clearBtn" type="button" aria-label="Очистить время окончания">×</button>
            <div id="liveTag" class="liveInline"><span class="liveDot"></span>Текущее время</div>
          </div>
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="rate">Стоимость часа</label>
        <div class="row">
          <button class="btn" id="minusBtn" type="button" aria-label="Уменьшить стоимость часа">−</button>
          <div class="rateWrap">
            <input id="rate" class="rateInput" type="text" inputmode="decimal" autocomplete="off" value="20" aria-label="Стоимость часа" />
            <span class="currency">€</span>
          </div>
          <button class="btn" id="plusBtn" type="button" aria-label="Увеличить стоимость часа">+</button>
        </div>
      </div>

      <div class="result">
        <div class="resultBox">
          <div class="resultLabel">Отработанное время</div>
          <div id="durationText" class="resultValue">—</div>
        </div>

        <div class="resultBox">
          <div class="resultLabel">Итоговая сумма</div>
          <div id="amountText" class="resultValue">—</div>
        </div>

        <div id="error" class="error"></div>
      </div>
    </section>
  </main>
  <span id="measure" class="measure"></span>

  <script>
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const startGhost = document.getElementById('startGhost');
    const endGhost = document.getElementById('endGhost');
    const startClear = document.getElementById('startClear');
    const endClear = document.getElementById('endClear');
    const rateInput = document.getElementById('rate');
    const durationText = document.getElementById('durationText');
    const amountText = document.getElementById('amountText');
    const errorText = document.getElementById('error');
    const liveTag = document.getElementById('liveTag');
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');
    const measure = document.getElementById('measure');

    function nowHHMM() {
      const now = new Date();
      return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    function digitsFromValue(value) {
      return String(value || '').replace(/\D/g, '').slice(0, 4);
    }

    function normalizeDigitsSequential(digits) {
      digits = digitsFromValue(digits);
      if (!digits) return '';
      if (digits.length === 1 && digits[0] >= '3') return '0' + digits[0];
      if (digits.length >= 2 && digits[0] === '0' && digits[1] >= '3') {
        return ('0' + digits[1] + digits.slice(2)).slice(0, 4);
      }
      if (digits[0] >= '3') return ('0' + digits).slice(0, 4);
      return digits;
    }

    function formatSequentialFromDigits(digits) {
      digits = normalizeDigitsSequential(digits);
      if (!digits) return '';
      if (digits.length <= 2) return digits;
      return digits.slice(0, 2) + ':' + digits.slice(2);
    }

    function finalizeDisplay(value) {
      const digits = normalizeDigitsSequential(digitsFromValue(value));
      if (!digits) return '';
      const padded = (digits + '0000').slice(0, 4);
      return padded.slice(0, 2) + ':' + padded.slice(2, 4);
    }

    function ghostSuffix(value) {
      const current = formatSequentialFromDigits(value);
      if (!current) return '00:00';
      if (current.length >= 5) return '';
      return '00:00'.slice(current.length);
    }

    function parseTime(value) {
      const match = /^(\d{2}):(\d{2})$/.exec(value.trim());
      if (!match) return null;
      const hh = Number(match[1]);
      const mm = Number(match[2]);
      if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return hh * 60 + mm;
    }

    function formatDuration(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      const hWord = h === 1 ? 'час' : (h >= 2 && h <= 4 ? 'часа' : 'час');
      return `${h} ${hWord} ${m} мин`;
    }

    function formatMoney(value) {
      const rounded = Math.round((value + Number.EPSILON) * 100) / 100;
      return `${rounded.toFixed(2)}€`;
    }

    function parseRate(value) {
      const cleaned = value.replace(',', '.').replace(/[^\d.]/g, '');
      if (!cleaned) return null;
      const num = Number(cleaned);
      return Number.isFinite(num) && num >= 0 ? num : null;
    }

    function updateGhostPosition(input, ghostEl) {
      measure.style.font = getComputedStyle(input).font;
      measure.style.letterSpacing = getComputedStyle(input).letterSpacing;
      measure.textContent = input.value || '';
      ghostEl.style.left = (16 + measure.getBoundingClientRect().width) + 'px';
    }

    function renderTimeField(input, ghostEl, clearBtn, allowLiveNow = false) {
      const hasValue = !!input.value;
      clearBtn.classList.toggle('visible', hasValue);

      if (allowLiveNow && !hasValue) {
        input.placeholder = nowHHMM();
        ghostEl.textContent = '';
        liveTag.style.display = 'flex';
        return;
      }

      input.placeholder = '';
      if (allowLiveNow) liveTag.style.display = 'none';

      ghostEl.textContent = ghostSuffix(input.value);
      updateGhostPosition(input, ghostEl);
    }

    function recalc() {
      errorText.textContent = '';

      renderTimeField(startInput, startGhost, startClear, false);
      renderTimeField(endInput, endGhost, endClear, true);

      const startValue = startInput.value ? finalizeDisplay(startInput.value) : '';
      const endValue = endInput.value ? finalizeDisplay(endInput.value) : nowHHMM();
      const rateValue = parseRate(rateInput.value);

      if (!startValue) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        return;
      }

      const startMinutes = parseTime(startValue);
      if (startMinutes === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте время начала.';
        return;
      }

      const endMinutes = parseTime(endValue);
      if (endMinutes === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте время окончания.';
        return;
      }

      if (rateValue === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте стоимость часа.';
        return;
      }

      let diff = endMinutes - startMinutes;
      if (diff < 0) diff += 24 * 60;

      durationText.textContent = formatDuration(diff);
      amountText.textContent = formatMoney((diff / 60) * rateValue);
    }

    function normalizeWholeField(input) {
      const final = finalizeDisplay(input.value);
      input.value = final;
      recalc();
    }

    function appendDigit(input, digit) {
      const currentDigits = digitsFromValue(input.value);
      const next = normalizeDigitsSequential((currentDigits + digit).slice(0, 4));
      input.value = formatSequentialFromDigits(next);
      recalc();
    }

    function removeLast(input) {
      const currentDigits = digitsFromValue(input.value);
      const next = currentDigits.slice(0, -1);
      input.value = formatSequentialFromDigits(next);
      recalc();
    }

    function attachTimeField(input, ghostEl, clearBtn, nextInput = null, allowLiveNow = false) {
      input.addEventListener('beforeinput', (event) => {
        const type = event.inputType || '';
        const data = (event.data || '').replace(/\D/g, '');

        if (type === 'insertText' && data) {
          event.preventDefault();
          appendDigit(input, data[0]);
          return;
        }

        if (type === 'deleteContentBackward' || type === 'deleteContentForward') {
          event.preventDefault();
          removeLast(input);
          return;
        }
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          normalizeWholeField(input);
          if (nextInput) nextInput.focus();
          else input.blur();
          return;
        }

        if (event.key === 'Backspace') {
          event.preventDefault();
          removeLast(input);
          return;
        }

        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          appendDigit(input, event.key);
        }
      });

      input.addEventListener('paste', (event) => {
        event.preventDefault();
        const pasted = (event.clipboardData || window.clipboardData).getData('text');
        input.value = formatSequentialFromDigits(normalizeDigitsSequential(digitsFromValue(pasted)));
        recalc();
      });

      input.addEventListener('blur', () => {
        if (input.value) normalizeWholeField(input);
        else recalc();
      });

      input.addEventListener('focus', () => recalc());

      clearBtn.addEventListener('click', () => {
        input.value = '';
        recalc();
        input.focus();
      });
    }

    attachTimeField(startInput, startGhost, startClear, endInput, false);
    attachTimeField(endInput, endGhost, endClear, null, true);

    rateInput.addEventListener('input', () => {
      rateInput.value = rateInput.value.replace(',', '.').replace(/[^\d.]/g, '');
      recalc();
    });

    minusBtn.addEventListener('click', () => {
      const current = parseRate(rateInput.value) ?? 20;
      const next = Math.max(0, Math.round((current - 1) * 100) / 100);
      rateInput.value = String(next).replace(/\.00$/, '');
      recalc();
    });

    plusBtn.addEventListener('click', () => {
      const current = parseRate(rateInput.value) ?? 20;
      const next = Math.round((current + 1) * 100) / 100;
      rateInput.value = String(next).replace(/\.00$/, '');
      recalc();
    });

    setInterval(() => {
      if (!endInput.value) recalc();
    }, 1000);

    window.addEventListener('resize', recalc);
    recalc();
  </script>
</body>
</html>
