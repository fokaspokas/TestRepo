<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Калькулятор рабочего времени</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e232d;
      --text: #f3f5f7;
      --muted: #98a2b3;
      --muted-2: rgba(152, 162, 179, 0.52);
      --accent: #6ea8fe;
      --border: #2b3240;
      --danger: #ef4444;
      --success: #22c55e;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0f14;
    }

    body {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0c0f14 0%, #11151c 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    .card {
      background: rgba(23, 26, 33, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    h1 {
      font-size: 1.45rem;
      line-height: 1.15;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      color: #d7dce4;
      font-weight: 600;
    }

    .inputShell {
      position: relative;
    }

    .input {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: transparent;
      caret-color: var(--text);
      border-radius: 16px;
      padding: 14px 52px 14px 16px;
      font-size: 1.15rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, transform .05s ease;
      letter-spacing: 0.01em;
      text-shadow: none;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(110, 168, 254, 0.14);
    }

    .timeVisual {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 14px 52px 14px 16px;
      font-size: 1.15rem;
      pointer-events: none;
      user-select: none;
      white-space: pre;
    }

    .char {
      display: inline-block;
      min-width: 0.58em;
      text-align: center;
      color: var(--muted-2);
    }

    .char.sep {
      min-width: 0.4em;
    }

    .char.typed {
      color: var(--text);
    }

    .char.dim {
      color: rgba(152, 162, 179, 0.72);
    }

    .char.live {
      color: rgba(243, 245, 247, 0.92);
    }

    .clearBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      color: rgba(243,245,247,0.82);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 2;
    }

    .clearBtn:active {
      transform: translateY(-50%) scale(0.97);
    }

    .clearBtn.visible {
      display: flex;
    }

    .row {
      display: grid;
      grid-template-columns: 56px 110px 56px;
      gap: 10px;
      align-items: center;
    }

    .btn {
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #1d2430 0%, #161c25 100%);
      color: var(--text);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .result {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: grid;
      gap: 12px;
    }

    .resultBox {
      background: linear-gradient(180deg, rgba(59,130,246,0.10), rgba(59,130,246,0.04));
      border: 1px solid rgba(110,168,254,.2);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .resultLabel {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .resultValue {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .error {
      min-height: 22px;
      color: #ff9090;
      font-size: 0.9rem;
      padding-left: 2px;
    }

    .liveInline {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #9db9ff;
      pointer-events: none;
    }

    .liveDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(34,197,94,.7);
    }

    .rateWrap {
      position: relative;
    }

    .rateInput {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 32px 14px 16px;
      font-size: 1.15rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .rateInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(110, 168, 254, 0.14);
    }

    .currency {
      position: absolute;
      right: 14px;
      top: 48%;
      transform: translateY(-50%);
      color: #98a2b3;
      font-size: 1.1rem;
      pointer-events: none;
    }

    @media (min-width: 520px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Калькулятор рабочего времени</h1>
      <p class="sub">Введите начало и окончание работы в формате ЧЧ:ММ. Если время окончания пустое, будет использоваться текущее время и результат станет пересчитываться автоматически.</p>

      <div class="grid two">
        <div class="field">
          <label for="start">Время начала</label>
          <div class="inputShell">
            <input
              id="start"
              class="input"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              enterkeyhint="next"
              aria-label="Время начала"
            />
            <div id="startVisual" class="timeVisual" aria-hidden="true"></div>
            <button id="startClear" class="clearBtn" type="button" aria-label="Очистить время начала">×</button>
          </div>
        </div>

        <div class="field">
          <label for="end">Время окончания</label>
          <div class="inputShell">
            <input
              id="end"
              class="input"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              enterkeyhint="done"
              aria-label="Время окончания"
            />
            <div id="endVisual" class="timeVisual" aria-hidden="true"></div>
            <button id="endClear" class="clearBtn" type="button" aria-label="Очистить время окончания">×</button>
            <div id="liveTag" class="liveInline">
              <span class="liveDot"></span>
              Текущее время
            </div>
          </div>
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="rate">Стоимость часа</label>
        <div class="row">
          <button class="btn" id="minusBtn" type="button" aria-label="Уменьшить стоимость часа">−</button>
          <div class="rateWrap">
            <input
              id="rate"
              class="rateInput"
              type="text"
              inputmode="decimal"
              autocomplete="off"
              value="20"
              aria-label="Стоимость часа"
            />
            <span class="currency">€</span>
          </div>
          <button class="btn" id="plusBtn" type="button" aria-label="Увеличить стоимость часа">+</button>
        </div>
      </div>

      <div class="result">
        <div class="resultBox">
          <div class="resultLabel">Отработанное время</div>
          <div id="durationText" class="resultValue">—</div>
        </div>

        <div class="resultBox">
          <div class="resultLabel">Итоговая сумма</div>
          <div id="amountText" class="resultValue">—</div>
        </div>

        <div id="error" class="error"></div>
      </div>
    </section>
  </main>

  <script>
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const startVisual = document.getElementById('startVisual');
    const endVisual = document.getElementById('endVisual');
    const startClear = document.getElementById('startClear');
    const endClear = document.getElementById('endClear');
    const rateInput = document.getElementById('rate');
    const durationText = document.getElementById('durationText');
    const amountText = document.getElementById('amountText');
    const errorText = document.getElementById('error');
    const liveTag = document.getElementById('liveTag');
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');

    function nowHHMM() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    function sanitizeRawDigits(raw) {
      let digits = String(raw || '').replace(/\D/g, '');
      if (!digits) return '';
      if (digits[0] >= '3') return digits.slice(0, 3);
      return digits.slice(0, 4);
    }

    function buildParts(fullText, typedIndexes = [], mode = 'template') {
      return fullText.split('').map((char, index) => {
        let cls = 'char';
        if (char === ':') cls += ' sep';
        if (mode === 'live') {
          cls += ' live';
        } else if (typedIndexes.includes(index)) {
          cls += ' typed';
        } else {
          cls += ' dim';
        }
        return `<span class="${cls}">${char}</span>`;
      }).join('');
    }

    function previewFromRaw(raw) {
      const digits = sanitizeRawDigits(raw);

      if (!digits) {
        return { text: '00:00', typedIndexes: [] };
      }

      if (digits[0] >= '3') {
        if (digits.length === 1) return { text: `0${digits[0]}:00`, typedIndexes: [1] };
        if (digits.length === 2) return { text: `0${digits[0]}:${digits[1]}0`, typedIndexes: [1, 3] };
        return { text: `0${digits[0]}:${digits[1]}${digits[2]}`, typedIndexes: [1, 3, 4] };
      }

      if (digits.length === 1) return { text: `0${digits[0]}:00`, typedIndexes: [1] };
      if (digits.length === 2) return { text: `${digits[0]}${digits[1]}:00`, typedIndexes: [0, 1] };
      if (digits.length === 3) return { text: `${digits[0]}${digits[1]}:${digits[2]}0`, typedIndexes: [0, 1, 3] };
      return { text: `${digits[0]}${digits[1]}:${digits[2]}${digits[3]}`, typedIndexes: [0, 1, 3, 4] };
    }

    function finalizedTimeFromRaw(raw) {
      const digits = sanitizeRawDigits(raw);
      if (!digits) return '';
      return previewFromRaw(digits).text;
    }

    function parseTime(value) {
      const match = /^(\d{2}):(\d{2})$/.exec(value.trim());
      if (!match) return null;

      const hh = Number(match[1]);
      const mm = Number(match[2]);

      if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return hh * 60 + mm;
    }

    function formatDuration(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      const hWord = h === 1 ? 'час' : (h >= 2 && h <= 4 ? 'часа' : 'час');
      return `${h} ${hWord} ${m} мин`;
    }

    function formatMoney(value) {
      const rounded = Math.round((value + Number.EPSILON) * 100) / 100;
      return `${rounded.toFixed(2)}€`;
    }

    function parseRate(value) {
      const cleaned = value.replace(',', '.').replace(/[^\d.]/g, '');
      if (!cleaned) return null;
      const num = Number(cleaned);
      return Number.isFinite(num) && num >= 0 ? num : null;
    }

    function renderTimeField(input, visual, clearBtn, allowLiveNow = false) {
      const raw = sanitizeRawDigits(input.dataset.raw || '');
      input.dataset.raw = raw;
      input.value = raw;

      if (allowLiveNow && raw === '') {
        visual.innerHTML = buildParts(nowHHMM(), [], 'live');
      } else {
        const preview = previewFromRaw(raw);
        visual.innerHTML = buildParts(preview.text, preview.typedIndexes, 'template');
      }

      clearBtn.classList.toggle('visible', raw.length > 0);

      if (allowLiveNow) {
        liveTag.style.display = raw.length === 0 ? 'flex' : 'none';
      }
    }

    function recalc() {
      errorText.textContent = '';

      renderTimeField(startInput, startVisual, startClear, false);
      renderTimeField(endInput, endVisual, endClear, true);

      const startValue = finalizedTimeFromRaw(startInput.dataset.raw || '');
      const endValue = (endInput.dataset.raw || '') ? finalizedTimeFromRaw(endInput.dataset.raw || '') : nowHHMM();
      const rateValue = parseRate(rateInput.value);

      if (!startValue) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        return;
      }

      const startMinutes = parseTime(startValue);
      if (startMinutes === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте время начала.';
        return;
      }

      const endMinutes = parseTime(endValue);
      if (endMinutes === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте время окончания.';
        return;
      }

      if (rateValue === null) {
        durationText.textContent = '—';
        amountText.textContent = '—';
        errorText.textContent = 'Проверьте стоимость часа.';
        return;
      }

      let diff = endMinutes - startMinutes;
      if (diff < 0) diff += 24 * 60;

      const amount = (diff / 60) * rateValue;
      durationText.textContent = formatDuration(diff);
      amountText.textContent = formatMoney(amount);
    }

    function setRaw(input, value) {
      input.dataset.raw = sanitizeRawDigits(value);
      recalc();
    }

    function handleBeforeInput(input, event) {
      const raw = sanitizeRawDigits(input.dataset.raw || '');
      const inputType = event.inputType || '';
      const data = (event.data || '').replace(/\D/g, '');

      if (inputType === 'deleteContentBackward' || inputType === 'deleteContentForward') {
        setRaw(input, raw.slice(0, -1));
        return;
      }

      if (inputType.startsWith('insert')) {
        setRaw(input, raw + data);
        return;
      }

      setRaw(input, input.value);
    }

    function attachTimeField(input, visual, clearBtn, nextInput = null, allowLiveNow = false) {
      input.dataset.raw = '';

      input.addEventListener('beforeinput', (event) => {
        event.preventDefault();
        handleBeforeInput(input, event);
      });

      input.addEventListener('input', () => {
        setRaw(input, input.value);
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          if (nextInput) nextInput.focus();
          else input.blur();
          return;
        }

        if (event.key === 'Backspace') {
          event.preventDefault();
          setRaw(input, (input.dataset.raw || '').slice(0, -1));
          return;
        }

        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          setRaw(input, (input.dataset.raw || '') + event.key);
        }
      });

      clearBtn.addEventListener('click', () => {
        setRaw(input, '');
        input.focus();
      });

      input.addEventListener('focus', () => renderTimeField(input, visual, clearBtn, allowLiveNow));
      input.addEventListener('blur', () => renderTimeField(input, visual, clearBtn, allowLiveNow));
    }

    attachTimeField(startInput, startVisual, startClear, endInput, false);
    attachTimeField(endInput, endVisual, endClear, null, true);

    rateInput.addEventListener('input', () => {
      rateInput.value = rateInput.value.replace(',', '.').replace(/[^\d.]/g, '');
      recalc();
    });

    minusBtn.addEventListener('click', () => {
      const current = parseRate(rateInput.value) ?? 20;
      const next = Math.max(0, Math.round((current - 1) * 100) / 100);
      rateInput.value = String(next).replace(/\.00$/, '');
      recalc();
    });

    plusBtn.addEventListener('click', () => {
      const current = parseRate(rateInput.value) ?? 20;
      const next = Math.round((current + 1) * 100) / 100;
      rateInput.value = String(next).replace(/\.00$/, '');
      recalc();
    });

    setInterval(() => {
      if ((endInput.dataset.raw || '') === '') {
        recalc();
      }
    }, 1000);

    recalc();
  </script>
</body>
</html>
